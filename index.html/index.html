<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad System</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #111;
  color: white;
}

/* Pages */
.page {
  display: none;
  height: 100vh;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
.active { display: flex; }

button {
  padding: 12px 20px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #ff9800;
}

/* AD OVERLAY */
#adOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 999;
}

/* Image */
#adImage {
  width: 90%;
  max-width: 400px;
  border-radius: 12px;
}

/* Controls */
.controls {
  width: 90%;
  max-width: 400px;
  margin-top: 10px;
}

#progressBar {
  width: 100%;
  height: 5px;
  background: #333;
}
#progress {
  height: 5px;
  width: 0%;
  background: orange;
}

.top-bar {
  position: absolute;
  top: 10px;
  right: 10px;
}

.small-btn {
  padding: 6px 10px;
  font-size: 12px;
  margin-left: 5px;
}
</style>
</head>

<body>

<!-- Pages -->
<div id="page1" class="page active">
  <h1>Home 🏠</h1>
  <button onclick="navigate('page2')">Next</button>
</div>

<div id="page2" class="page">
  <h1>Explore 🔍</h1>
  <button onclick="navigate('page3')">Continue</button>
</div>

<div id="page3" class="page">
  <h1>YOU CAN DOWNLOAD IT NOW</h1>
  <button onclick="downloadFile()">Download</button>
</div>

<!-- 📢 AD -->
<div id="adOverlay">

  <div class="top-bar">
    <button id="skipBtn" class="small-btn" disabled>Skip in 5</button>
    <button class="small-btn" onclick="toggleMute()">Mute</button>
  </div>

  <img id="adImage" src="">

  <div class="controls">
    <div id="progressBar">
      <div id="progress"></div>
    </div>
    <button onclick="clickAd()">Visit Sponsor</button>
  </div>

</div>

<!-- 🎵 MUSIC -->
<audio id="adMusic" src="admusic.mp3"></audio>

<script>

let nextPage = "";
let adCounter = 0;

let adImages = ["ad1.jpg","ad2.jpg","ad3.jpg"];
let slideIndex = 0;
let slideInterval;

/* NAVIGATION */
function navigate(page){
  nextPage = page;
  adCounter++;

  if(adCounter % 2 === 0){
    showAd();
  } else {
    goToPage();
  }
}

/* SHOW AD */
function showAd(){
  let overlay = document.getElementById("adOverlay");
  let img = document.getElementById("adImage");
  let music = document.getElementById("adMusic");

  overlay.style.display = "flex";

  slideIndex = 0;
  img.src = adImages[slideIndex];

  // Music
  music.currentTime = 0;
  music.play();

  // Slideshow
  slideInterval = setInterval(()=>{
    slideIndex = (slideIndex + 1) % adImages.length;
    img.src = adImages[slideIndex];

    let progress = ((slideIndex + 1) / adImages.length) * 100;
    document.getElementById("progress").style.width = progress + "%";

  },2000);

  startSkipTimer();
}

/* SKIP TIMER */
function startSkipTimer(){
  let skipBtn = document.getElementById("skipBtn");
  let time = 10;

  skipBtn.disabled = true;

  let interval = setInterval(()=>{
    time--;
    skipBtn.innerText = "Skip in " + time;

    if(time <= 0){
      clearInterval(interval);
      skipBtn.disabled = false;
      skipBtn.innerText = "Skip";
      skipBtn.onclick = closeAd;
    }
  },1000);
}

/* CLOSE AD */
function closeAd(){
  document.getElementById("adOverlay").style.display = "none";
  document.getElementById("adMusic").pause();
  clearInterval(slideInterval);

  goToPage();
}

/* PAGE SWITCH */
function goToPage(){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(nextPage).classList.add("active");
}

/* MUTE */
function toggleMute(){
  let music = document.getElementById("adMusic");
  music.muted = !music.muted;
}

/* CLICK AD */
function clickAd(){
  alert("Opening advertiser site...");
}

</script>

</body>
</html>
